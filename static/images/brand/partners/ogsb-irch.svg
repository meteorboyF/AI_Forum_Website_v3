<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 55" width="160" height="55">
  <style>
    .text {
      font-family: 'Space Grotesk Variable', 'Inter Variable', sans-serif;
      font-weight: 700;
      font-size: 16px;
      fill: currentColor;
      letter-spacing: -0.02em;
    }
    .dot {
      fill: #3039e5; /* electric */
    }
  </style>
  <g transform="translate(10, 32)">
    <text x="0" y="0" class="text">OGSB &amp; IRCH</text>
    <!-- Jamdani-inspired offset dot at the end -->
    <!-- We dynamically offset based on an estimated text width -->
    <rect x="103.19999999999999" y="-11" width="5" height="5" class="dot" transform="rotate(45 105.69999999999999 -8.5)" />
  </g>
</svg>

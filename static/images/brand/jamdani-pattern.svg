<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <style>
    .grid-line {
      stroke: currentColor;
      stroke-width: 0.75;
      stroke-dasharray: 2 2;
      opacity: 0.12;
      fill: none;
    }
    .motif-main {
      fill: none;
      stroke: currentColor;
      stroke-width: 1;
      opacity: 0.25;
    }
    .motif-accent {
      fill: currentColor;
      opacity: 0.2;
    }
  </style>
  
  <!-- Diagonal Lattice Grid -->
  <path class="grid-line" d="M 40,0 L 80,40 L 40,80 L 0,40 Z" />
  <path class="grid-line" d="M 0,0 L 80,80" />
  <path class="grid-line" d="M 80,0 L 0,80" />
  
  <!-- Central Diamond Flower Motif (Panna Hazara style) -->
  <g transform="translate(40, 40)">
    <!-- Central diamond -->
    <path class="motif-main" d="M 0,-8 L 8,0 L 0,8 L -8,0 Z" />
    <!-- Outer corner accents -->
    <polygon class="motif-accent" points="0,-12 -3,-9 3,-9" />
    <polygon class="motif-accent" points="12,0 9,-3 9,3" />
    <polygon class="motif-accent" points="0,12 -3,9 3,9" />
    <polygon class="motif-accent" points="-12,0 -9,-3 -9,3" />
    <!-- Small dots inside the quadrants -->
    <circle cx="0" cy="0" r="1.5" class="motif-accent" />
  </g>

  <!-- Corner Motif elements (to repeat seamlessly at 0,0 / 80,0 / 0,80 / 80,80) -->
  <g transform="translate(0, 0)">
    <path class="motif-main" d="M 0,8 L 8,0 M 0,0" />
    <circle cx="0" cy="0" r="1.5" class="motif-accent" />
  </g>
  <g transform="translate(80, 0)">
    <path class="motif-main" d="M 0,8 L -8,0 M 0,0" />
    <circle cx="0" cy="0" r="1.5" class="motif-accent" />
  </g>
  <g transform="translate(0, 80)">
    <path class="motif-main" d="M 0,-8 L 8,0 M 0,0" />
    <circle cx="0" cy="0" r="1.5" class="motif-accent" />
  </g>
  <g transform="translate(80, 80)">
    <path class="motif-main" d="M 0,-8 L -8,0 M 0,0" />
    <circle cx="0" cy="0" r="1.5" class="motif-accent" />
  </g>
  
  <!-- Halfway Motifs for seamless edge transitions -->
  <g transform="translate(40, 0)">
    <path class="motif-main" d="M -4,0 L 0,4 L 4,0" />
  </g>
  <g transform="translate(40, 80)">
    <path class="motif-main" d="M -4,0 L 0,-4 L 4,0" />
  </g>
  <g transform="translate(0, 40)">
    <path class="motif-main" d="M 0,-4 L 4,0 L 0,4" />
  </g>
  <g transform="translate(80, 40)">
    <path class="motif-main" d="M 0,-4 L -4,0 L 0,4" />
  </g>
</svg>

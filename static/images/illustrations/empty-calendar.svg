<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <style>
    .bg { fill: none; }
    .border-line { stroke: #040940; stroke-width: 1.5; fill: none; }
    .accent-electric { stroke: #3039e5; stroke-width: 1.5; fill: none; }
    .accent-aqua { stroke: #06b6d4; stroke-width: 1.5; fill: none; }
    .fill-gold { fill: #f59e0b; }
    .fill-aqua { fill: #06b6d4; }
    .dashed { stroke-dasharray: 4 4; }
    .thin { stroke-width: 1; opacity: 0.5; }
  </style>
  <rect width="200" height="200" class="bg" />
  
  <!-- Back orbital circle -->
  <circle cx="100" cy="100" r="70" class="accent-electric dashed thin" />
  <circle cx="100" cy="100" r="50" class="accent-aqua thin" />
  
  <!-- Diagonal axis guide -->
  <line x1="40" y1="40" x2="160" y2="160" class="border-line thin dashed" />
  
  <!-- Stylized calendar container -->
  <g transform="translate(65, 60)">
    <!-- Base Board -->
    <rect x="0" y="0" width="70" height="75" rx="8" class="border-line" fill="#faf9f6" />
    <!-- Header Block -->
    <path d="M 0,8 A 8,8 0 0,1 8,0 L 62,0 A 8,8 0 0,1 70,8 L 70,20 L 0,20 Z" fill="#3039e5" />
    
    <!-- Wire rings -->
    <rect x="15" y="-6" width="6" height="12" rx="3" class="border-line" fill="#040940" />
    <rect x="49" y="-6" width="6" height="12" rx="3" class="border-line" fill="#040940" />
    
    <!-- Grid placeholders inside calendar -->
    <circle cx="18" cy="35" r="3" class="fill-gold" />
    <circle cx="35" cy="35" r="3" class="fill-gold" opacity="0.3" />
    <circle cx="52" cy="35" r="3" class="fill-gold" opacity="0.3" />
    
    <circle cx="18" cy="48" r="3" class="fill-gold" opacity="0.3" />
    <circle cx="35" cy="48" r="3" class="fill-gold" opacity="0.3" />
    <circle cx="52" cy="48" r="3" class="fill-gold" opacity="0.3" />

    <circle cx="18" cy="61" r="3" class="fill-gold" opacity="0.3" />
    <circle cx="35" cy="61" r="3" class="fill-gold" opacity="0.3" />
    <!-- Pulse Highlight on a specific date -->
    <circle cx="52" cy="61" r="3" class="fill-aqua" />
    <circle cx="52" cy="61" r="8" stroke="#06b6d4" stroke-width="1" fill="none" class="dashed">
      <animate attributeName="r" values="3;9;3" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Floating Jamdani diamond motifs -->
  <polygon points="40,95 45,90 40,85 35,90" fill="#f59e0b" />
  <polygon points="160,105 166,99 160,93 154,99" fill="#3039e5" />
  <polygon points="100,28 104,24 100,20 96,24" fill="#06b6d4" />
</svg>

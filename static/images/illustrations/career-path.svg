<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" width="240" height="200">
  <style>
    .bg { fill: none; }
    .stroke-ink { stroke: #040940; stroke-width: 1.5; fill: none; }
    .stroke-electric { stroke: #3039e5; stroke-width: 1.5; fill: none; }
    .stroke-aqua { stroke: #06b6d4; stroke-width: 1.5; fill: none; }
    .fill-gold { fill: #f59e0b; }
    .fill-electric { fill: #3039e5; }
    .dashed { stroke-dasharray: 4 4; }
    .thin { stroke-width: 1; opacity: 0.5; }
  </style>
  <rect width="240" height="200" class="bg" />

  <!-- Grid lines representing a plan or blueprint -->
  <line x1="30" y1="20" x2="30" y2="180" class="stroke-ink thin dashed" />
  <line x1="30" y1="180" x2="220" y2="180" class="stroke-ink thin" />
  <line x1="120" y1="20" x2="120" y2="180" class="stroke-ink thin dashed" />
  <line x1="210" y1="20" x2="210" y2="180" class="stroke-ink thin dashed" />
  
  <!-- Ascending stairs/bars -->
  <g transform="translate(10, 0)">
    <!-- Steps -->
    <rect x="40" y="145" width="25" height="35" class="stroke-ink" fill="#f1f2fe" />
    <rect x="75" y="115" width="25" height="65" class="stroke-ink" fill="#e3e5fd" />
    <rect x="110" y="85" width="25" height="95" class="stroke-ink" fill="#faf9f6" />
    <rect x="145" y="55" width="25" height="125" class="stroke-ink" fill="#3039e5" />
    
    <!-- Pathway dashed arc -->
    <path d="M 52,145 Q 90,80 157,55" class="stroke-aqua" stroke-width="2" fill="none" />
    <path d="M 157,55 L 148,53 M 157,55 L 155,64" class="stroke-aqua" stroke-width="2" fill="none" />
  </g>

  <!-- Golden Goal / Star (Jamdani diamond star) -->
  <g transform="translate(195, 45)">
    <polygon points="0,-16 5,-5 16,0 5,5 0,16 -5,5 -16,0 -5,-5" class="fill-gold" />
    <circle cx="0" cy="0" r="3" fill="#ffffff" />
    <!-- Outer accent rings -->
    <circle cx="0" cy="0" r="24" class="stroke-electric thin dashed" />
  </g>
  
  <!-- Floating diamond elements -->
  <polygon points="65,40 70,35 65,30 60,35" class="fill-electric" />
  <polygon points="120,30 124,26 120,22 116,26" fill="#06b6d4" />
</svg>
